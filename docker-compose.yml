services:
  sales-db:
    image: postgres:16-alpine
    container_name: sales-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sales_system
      POSTGRES_USER: sales_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SalesSystem2026!}
    volumes:
      - sales_pgdata:/var/lib/postgresql/data
      - ./backend/src/migrations/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./backend/src/seeds/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales_admin -d sales_system"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sales-network
  sales-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sales-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: sales-db
      DB_PORT: 5432
      DB_NAME: sales_system
      DB_USER: sales_admin
      DB_PASSWORD: ${DB_PASSWORD:-SalesSystem2026!}
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_random_secret_key_in_production}
      JWT_EXPIRES_IN: 8h
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "4000:4000"
    depends_on:
      sales-db:
        condition: service_healthy
    networks:
      - sales-network
  sales-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sales-web
    restart: unless-stopped
    ports:
      - "3080:80"
    depends_on:
      - sales-api
    networks:
      - sales-network
volumes:
  sales_pgdata:
  uploads_data:
networks:
  sales-network:
    driver: bridge
